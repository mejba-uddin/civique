<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#2457f5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CSP Revision">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <title>Examen Civique CSP – Révision complète & Quiz officiel</title>
    <style>
        :root {
            --bg: #f6f8fd;
            --surface: #ffffff;
            --surface-soft: #eff3ff;
            --text: #172033;
            --text-soft: #56627a;
            --primary: #2457f5;
            --primary-soft: #dbe4ff;
            --accent: #14b8a6;
            --danger: #ef4444;
            --success: #16a34a;
            --border: #dfe5f2;
            --shadow: 0 8px 28px rgba(34, 55, 99, 0.08);
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1522;
                --surface: #171f31;
                --surface-soft: #1f2a42;
                --text: #ecf1ff;
                --text-soft: #b6c2df;
                --primary: #7ea0ff;
                --primary-soft: #273861;
                --accent: #2dd4bf;
                --danger: #f87171;
                --success: #34d399;
                --border: #2b3a5d;
                --shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
            }
        }

        body[data-theme="light"] {
            --bg: #f6f8fd;
            --surface: #ffffff;
            --surface-soft: #eff3ff;
            --text: #172033;
            --text-soft: #56627a;
            --primary: #2457f5;
            --primary-soft: #dbe4ff;
            --accent: #14b8a6;
            --danger: #ef4444;
            --success: #16a34a;
            --border: #dfe5f2;
            --shadow: 0 8px 28px rgba(34, 55, 99, 0.08);
        }

        body[data-theme="dark"] {
            --bg: #0f1522;
            --surface: #171f31;
            --surface-soft: #1f2a42;
            --text: #ecf1ff;
            --text-soft: #b6c2df;
            --primary: #7ea0ff;
            --primary-soft: #273861;
            --accent: #2dd4bf;
            --danger: #f87171;
            --success: #34d399;
            --border: #2b3a5d;
            --shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top right, rgba(36, 87, 245, 0.14), transparent 35%), var(--bg);
            color: var(--text);
            line-height: 1.45;
            padding: 12px;
        }

        .app {
            max-width: 860px;
            margin: 0 auto;
            display: grid;
            gap: 12px;
        }

        .hero {
            background: linear-gradient(140deg, var(--primary), #1f3da2);
            color: #fff;
            border-radius: 24px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .hero h1 {
            font-size: 1.15rem;
            line-height: 1.25;
            margin-bottom: 6px;
        }

        .hero p {
            font-size: 0.9rem;
            opacity: 0.95;
        }

        .chip-row {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            background: rgba(255, 255, 255, 0.13);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            min-height: 42px;
        }

        .toolbar {
            position: sticky;
            top: 6px;
            z-index: 15;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 10px;
            display: grid;
            gap: 8px;
        }

        .toolbar-main,
        .toolbar-secondary {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 14px;
            padding: 10px 14px;
            font-weight: 700;
            font-size: 0.9rem;
            min-height: 46px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .btn-soft {
            background: var(--primary-soft);
            border-color: transparent;
        }

        .btn.active {
            background: var(--text);
            color: var(--surface);
            border-color: transparent;
        }

        .view {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 12px;
            min-height: 280px;
        }

        .view-head {
            display: grid;
            gap: 8px;
            margin-bottom: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .stat {
            background: var(--surface-soft);
            border-radius: var(--radius-sm);
            padding: 10px;
            text-align: center;
        }

        .stat strong {
            display: block;
            font-size: 1rem;
        }

        .filters {
            display: grid;
            gap: 8px;
            grid-template-columns: 1fr;
        }

        input, select {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            border-radius: 12px;
            min-height: 44px;
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        .study-list {
            display: grid;
            gap: 10px;
        }

        .accordion {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--surface);
        }

        .accordion-top {
            padding: 12px;
            display: grid;
            gap: 8px;
        }

        .q-main {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .q-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .q-meta {
            font-size: 0.83rem;
            color: var(--text-soft);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .icon-btn {
            border: 1px solid var(--border);
            background: var(--surface-soft);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
        }

        .mini-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .accordion-body {
            border-top: 1px solid var(--border);
            padding: 12px;
            display: none;
            animation: fadeIn 0.25s ease;
            background: var(--surface-soft);
        }

        .accordion.open .accordion-body {
            display: block;
        }

        .answer {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .bn {
            font-family: "Noto Sans Bengali", sans-serif;
            color: var(--text-soft);
            font-size: 0.9rem;
        }

        .study-shell {
            display: grid;
            gap: 6px;
        }

        .study-compact-toolbar {
            position: sticky;
            top: 6px;
            z-index: 12;
            background: color-mix(in srgb, var(--surface) 94%, transparent);
            border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
            border-radius: 10px;
            padding: 4px;
            display: grid;
            gap: 4px;
        }

        .study-compact-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 4px;
            align-items: center;
        }

        .study-chip-row {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 1px;
        }

        .study-chip {
            border: 1px solid var(--border);
            background: var(--surface-soft);
            color: var(--text);
            border-radius: 999px;
            padding: 4px 9px;
            min-height: 30px;
            font-size: 0.76rem;
            font-weight: 400;
            white-space: nowrap;
            cursor: pointer;
        }

        .study-chip.active {
            background: var(--primary-soft);
            border-color: var(--primary);
            color: var(--primary);
        }

        .study-advanced {
            display: none;
            border-top: 1px dashed color-mix(in srgb, var(--border) 70%, transparent);
            padding-top: 4px;
            gap: 4px;
        }

        .study-advanced.open {
            display: grid;
        }

        .study-count {
            font-size: 0.76rem;
            color: var(--text-soft);
            padding-left: 2px;
        }

        .study-list.compact {
            gap: 4px;
        }

        .study-compact-card {
            border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
            border-radius: 8px;
            padding: 6px 7px;
            background: var(--surface);
            display: grid;
            gap: 2px;
        }

        .study-q {
            font-size: 0.88rem;
            line-height: 1.24;
            font-weight: 400;
        }

        .study-a {
            font-size: 0.84rem;
            line-height: 1.22;
            font-weight: 400;
        }

        .study-cue,
        .study-warn {
            font-size: 0.76rem;
            color: var(--text-soft);
            line-height: 1.18;
        }

        .study-bn-line {
            font-size: 0.74rem;
            color: color-mix(in srgb, var(--text-soft) 85%, transparent);
            line-height: 1.16;
        }

        .quiz-top {
            position: sticky;
            top: 84px;
            z-index: 14;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 10px;
            margin-bottom: 10px;
            display: grid;
            gap: 8px;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: var(--surface-soft);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            transition: width 0.28s ease;
        }

        .quiz-meta {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px;
            background: var(--surface);
        }

        .question-line {
            font-size: 1.07rem;
            font-weight: 800;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .options {
            margin-top: 10px;
            display: grid;
            gap: 8px;
        }

        .option {
            border: 1px solid var(--border);
            background: var(--surface-soft);
            color: var(--text);
            border-radius: 14px;
            min-height: 52px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .option.selected {
            border-color: var(--primary);
            background: var(--primary-soft);
            box-shadow: 0 0 0 2px rgba(36, 87, 245, 0.16) inset;
        }

        .option.correct {
            border-color: var(--success);
            background: rgba(22, 163, 74, 0.15);
        }

        .option.wrong {
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.15);
        }

        .quiz-actions {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }

        .review-pill {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 12px;
            min-height: 42px;
            font-weight: 700;
            cursor: pointer;
        }

        .review-pill.done {
            background: rgba(22, 163, 74, 0.14);
            border-color: var(--success);
        }

        .analytics {
            display: grid;
            gap: 10px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.78rem;
            font-weight: 700;
            background: var(--surface-soft);
            color: var(--text-soft);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .confetti {
            position: fixed;
            top: -12px;
            width: 8px;
            height: 14px;
            opacity: 0.9;
            animation: confettiDrop 2.4s linear forwards;
            z-index: 999;
        }

        .install-fab {
            position: fixed;
            right: 12px;
            bottom: 12px;
            z-index: 1000;
            border: 1px solid var(--primary);
            background: var(--primary);
            color: #fff;
            border-radius: 999px;
            padding: 10px 14px;
            min-height: 40px;
            font-size: 0.82rem;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(36, 87, 245, 0.28);
            cursor: pointer;
            display: none;
        }

        .install-fab.show {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes confettiDrop {
            to {
                transform: translateY(105vh) rotate(540deg);
                opacity: 0.2;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (min-width: 720px) {
            body {
                padding: 20px;
            }

            .hero {
                padding: 20px;
            }

            .hero h1 {
                font-size: 1.55rem;
            }

            .filters {
                grid-template-columns: 1.2fr 0.8fr;
            }

            .view {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<button id="installAppBtn" class="install-fab" type="button" aria-label="Installer l'application">Installer</button>
<div class="app" id="app">
    <header class="hero">
        <h1>Preparation officielle CSP <span style="font-family:'Noto Sans Bengali',sans-serif;">(সিভিক পরীক্ষা)</span></h1>
        <p>Application de revision serieuse: mode etude, quiz intelligent, suivi de progression et prononciation.</p>
        <div class="chip-row">
            <span class="chip">Sans distraction</span>
            <span class="chip">Mobile first</span>
            <span class="chip">FR + BN + audio</span>
        </div>
    </header>

    <section class="toolbar" aria-label="Actions principales">
        <div class="toolbar-main">
            <button id="navStudy" class="btn active" type="button">Etude</button>
            <button id="navRandomQuiz" class="btn" type="button">Quiz aleatoire</button>
            <button id="navCategoryQuiz" class="btn" type="button">Quiz categorie</button>
            <button id="navDailyQuiz" class="btn" type="button">Pratique du jour</button>
            <button id="navRetryWrong" class="btn" type="button">Reessayer erreurs</button>
        </div>
        <div class="toolbar-secondary">
            <button id="soundToggle" class="btn btn-soft" type="button" aria-pressed="true">Son ON</button>
            <button id="speedToggle" class="btn btn-soft" type="button" aria-pressed="false">Prononciation lente OFF</button>
            <button id="themeToggle" class="btn btn-soft" type="button">Theme auto</button>
        </div>
    </section>

    <main id="mainContent" class="view" aria-live="polite"></main>
</div>
<script>
    // ============================================================
    // DONNÉES COMPLÈTES : toutes les questions officielles
    // Chaque objet : cat, qFr, qBn, qPronounce, aFr, aBn, aPronounce
    // ============================================================
    const fullQuestions = [
        // PRINCIPES ET VALEURS (37 questions officielles)
        { cat:"🇫🇷 Principes & valeurs", qFr:"À quoi correspond la date du 14 juillet ?", qBn:"১৪ জুলাই তারিখটি কীসের সাথে সম্পর্কিত?", qPronounce:"আ কোয়া কোরেসপোঁ লা দাত দু কাতোর্জুইয়ে ?", aFr:"À la Fête nationale (prise de la Bastille en 1789).", aBn:"জাতীয় দিবস (১৭৮৯ সালে বাস্তিল দুর্গ দখল)।", aPronounce:"আ লা ফেত নাসিওনাল (প্রিজ দ্য লা বাস্তিল আঁ মিল সেপ সাঁক সঁকান্ত নোঁফ) ।" },
        { cat:"🇫🇷 Principes & valeurs", qFr:"Quel est l’un des symboles de la République française ?", qBn:"ফরাসি প্রজাতন্ত্রের একটি প্রতীক কী?", qPronounce:"কেল এ লাঁ দে সাঁবোল দ্য লা রেপ্যুব্লিক ফ্রঁসেজ ?", aFr:"Le drapeau tricolore.", aBn:"ত্রিবর্ণ পতাকা।", aPronounce:"ল্য দ্রাপো ত্রিকোলোর।" },
        { cat:"🇫🇷 Principes & valeurs", qFr:"Le principe d’égalité signifie que :", qBn:"সাম্যের নীতিটির অর্থ কী?", qPronounce:"ল্য প্রাঁসিপ দেগালিতে সিনিফিয়ে কে ?", aFr:"Tous les citoyens sont égaux devant la loi.", aBn:"আইনের চোখে সবাই সমান।", aPronounce:"তু লে সিতোয়েঁ সোঁ এগো দ্যেভাঁ লা লোয়া।" },
        { cat:"🇫🇷 Principes & valeurs", qFr:"'Liberté, égalité, fraternité', c’est :", qBn:"'স্বাধীনতা, সাম্য, ভ্রাতৃত্ব' এটি কী?", qPronounce:"লিবেরতে, এগালিতে, ফ্রাতের্নিতে, সে ?", aFr:"La devise de la République française.", aBn:"ফরাসি প্রজাতন্ত্রের মূলমন্ত্র।", aPronounce:"লা দ্যাভিজ দ্য লা রেপ্যুব্লিক ফ্রঁসেজ।" },
        { cat:"🇫🇷 Principes & valeurs", qFr:"A-t-on le droit d'insulter publiquement quelqu’un parce qu’il est différent (handicap, apparence physique, sexe…) ?", qBn:"কাউকে ভিন্ন (প্রতিবন্ধী, চেহারা, লিঙ্গ) বলে প্রকাশ্যে অপমান করার অধিকার কি আছে?", qPronounce:"আ-তোঁ ল্য দ্রোয়া দাঁস্যুলতে পুব্লিকমঁ কেলক্যাঁ পার্সকিেল এ দিফেরঁ ?", aFr:"Non, c’est interdit par la loi.", aBn:"না, এটি আইনত নিষিদ্ধ।", aPronounce:"নোঁ, সে তাঁতের্দি পার লা লোয়া।" },
        { cat:"🇫🇷 Principes & valeurs", qFr:"Certains métiers peuvent-ils être réservés aux hommes ?", qBn:"কিছু পেশা কি শুধু পুরুষদের জন্য সংরক্ষিত হতে পারে?", qPronounce:"সার্তাঁ মেতিয়ে প্যুভঁ-তিল জেত্র রেজেরভে ওজোম ?", aFr:"Non, l’égalité hommes-femmes est un principe fondamental.", aBn:"না, নারী-পুরুষ সমান অধিকারভুক্ত।", aPronounce:"নোঁ, লেগালিতে ওম-ফাম এ তাঁ প্রাঁসিপ ফোঁদামঁতাল।" },
        { cat:"🇫🇷 Principes & valeurs", qFr:"De quand date la Constitution de la Ve République ?", qBn:"পঞ্চম প্রজাতন্ত্রের সংবিধান কবে থেকে কার্যকর?", qPronounce:"দ্য কঁ দাত লা কোঁস্তিত্যুসিওঁ দ্য লা সাঁকিয়েম রেপ্যুব্লিক ?", aFr:"1958.", aBn:"১৯৫৮ সাল।", aPronounce:"মিল নেফ সাঁক সঁকান্ত।" },

    function getDaysDiff(fromStr, toStr) {
        const from = new Date(fromStr);
        const to = new Date(toStr);
        return Math.floor((to - from) / (1000 * 60 * 60 * 24));

    function shuffle(list) {
        const copy = [...list];
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    function escapeHtml(text) {
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function classifyAnswerType(answer) {
        const a = (answer || "").toLowerCase();
        if (/\b(oui|non)\b/.test(a) && a.length < 36) return ANSWER_TYPES.BOOLEAN;
        if (/\b\d{4}\b/.test(a) || /janvier|février|mars|avril|mai|juin|juillet|août|septembre|octobre|novembre|décembre/.test(a)) return ANSWER_TYPES.DATE;
        if (/\b\d+\b/.test(a)) return ANSWER_TYPES.NUMBER;
        if (/marianne|drapeau|devise|hymne|marseillaise|coq|symbole/.test(a)) return ANSWER_TYPES.SYMBOL;
        if (/paris|lyon|marseille|nice|corse|algérie|france|union européenne|atlantique|méditerranée|seine|europe/.test(a)) return ANSWER_TYPES.PLACE;
        if (/président|premier ministre|parlement|sénat|assemblée|juge|tribunal|gouvernement|maire|préfet/.test(a)) return ANSWER_TYPES.INSTITUTION;
        if (/charles|napoléon|jules|molière|baudelaire|sand|beauvoir|camus|cézanne|chagall|baker|piaf|hugo|louis/.test(a)) return ANSWER_TYPES.PERSON;
        if (/^à |^le |^la |^les |^une |^un /.test(a) && /er\b|ir\b|re\b|tion\b/.test(a)) return ANSWER_TYPES.ACTION;
        return ANSWER_TYPES.OTHER;
    }

        return tags;

    function defaultProgress() {
        const today = getTodayKey();
        return {
            successCount: 0,
            failCount: 0,
            unsureCount: 0,
            highConfidenceFailCount: 0,
            slowRecallCount: 0,
            confusionTrapCount: 0,
            lastReviewed: "",
            nextReview: today,
            masteryScore: 0,
            masteryLevel: "New",
            avgSec: 0,
            reviewCount: 0,
            lastFailedAt: ""
        };
    }

    function getProgress(questionId) {
        if (!appState.progress[questionId]) appState.progress[questionId] = defaultProgress();
        appState.progress[questionId] = { ...defaultProgress(), ...appState.progress[questionId] };
        return appState.progress[questionId];
    }

    function masteryLevel(score) {
        if (score >= 85) return "Mastered";
        if (score >= 65) return "Strong";
        if (score >= 45) return "Familiar";
        if (score >= 20) return "Learning";
        return "New";
    }

    function intervalFromMastery(score, isFail, confidence = "confident") {
        if (isFail) return 1;
        if (confidence === "unsure") {
            if (score >= 85) return REVIEW_INTERVALS[2];
            if (score >= 65) return REVIEW_INTERVALS[1];
            return REVIEW_INTERVALS[0];
        }
        if (score >= 85) return REVIEW_INTERVALS[4];
        if (score >= 65) return REVIEW_INTERVALS[3];
        if (score >= 45) return REVIEW_INTERVALS[2];
        if (score >= 20) return REVIEW_INTERVALS[1];
        return REVIEW_INTERVALS[0];
    }

    function updateProgress(question, ok, responseSec, confidence = "confident") {
        const p = getProgress(question.id);
        const today = getTodayKey();
        const intel = getQuestionIntel(question);
        p.reviewCount += 1;
        p.lastReviewed = today;
        p.avgSec = p.avgSec ? Math.round(((p.avgSec * (p.reviewCount - 1)) + responseSec) / p.reviewCount) : Math.round(responseSec);
        if (responseSec >= 12) p.slowRecallCount += 1;

        if (ok) {
            p.successCount += 1;
            const gain = confidence === "unsure" ? 5 : (question.difficulty === "hard" ? 9 : 11);
            p.masteryScore = Math.min(100, p.masteryScore + gain);
            if (confidence === "unsure") p.unsureCount += 1;
        } else {
            p.failCount += 1;
            p.lastFailedAt = today;
            p.masteryScore = Math.max(0, p.masteryScore - 17);
            if (confidence === "confident") p.highConfidenceFailCount += 1;
            if (intel && /trap|confused|important/i.test(intel.examTrap || "")) p.confusionTrapCount += 1;
        }

        p.masteryLevel = masteryLevel(p.masteryScore);
        const nextInterval = intervalFromMastery(p.masteryScore, !ok, confidence);
        p.nextReview = addDays(today, nextInterval);
    }

    function getQuestionPriority(question) {
        const p = getProgress(question.id);
        const today = getTodayKey();
        const daysUntilDue = getDaysDiff(today, p.nextReview || today);
        let score = 0;

        if (!p.lastReviewed) score += 22;
        if (daysUntilDue <= 0) score += 34;
        if (daysUntilDue > 0) score += Math.max(0, 8 - daysUntilDue);
        score += p.failCount * 6;
        score += p.unsureCount * 4;
        score += appState.wrongIds.has(question.id) ? 15 : 0;
        score += appState.difficultIds.has(question.id) ? 9 : 0;
        score += question.difficulty === "hard" ? 5 : 0;
        if (p.masteryScore >= 85) score -= 26;

        const cat = categoryMetrics()[question.category];
        if (cat && cat.mastery < 55) score += 8;

        return score + Math.random() * 1.5;
    }

    function categoryMetrics() {
        const out = {};
        Object.keys(byCategory).forEach(cat => {
            const items = byCategory[cat];
            const reviewed = items.filter(q => !!getProgress(q.id).lastReviewed).length;
            const masteryAvg = Math.round(items.reduce((sum, q) => sum + getProgress(q.id).masteryScore, 0) / items.length);
            const weak = items.filter(q => getProgress(q.id).masteryScore < 45).length;
            out[cat] = {
                completion: Math.round((reviewed / items.length) * 100),
                mastery: masteryAvg,
                weak
            };
        });
        return out;
    }

    function recordDailyActivity(questionsDelta, xpDelta, secondsDelta) {
        const today = getTodayKey();
        if (!appState.daily.history[today]) {
            appState.daily.history[today] = { questions: 0, xp: 0, seconds: 0 };
        }
        appState.daily.history[today].questions += questionsDelta;
        appState.daily.history[today].xp += xpDelta;
        appState.daily.history[today].seconds += secondsDelta;
    }

    function streakCount() {
        const keys = Object.keys(appState.daily.history).sort().reverse();
        if (!keys.length) return 0;
        let streak = 0;
        let cursor = getTodayKey();
        for (let i = 0; i < 365; i++) {
            const entry = appState.daily.history[cursor];
            if (entry && entry.questions > 0) {
                streak += 1;
                cursor = addDays(cursor, -1);
            } else {
                break;
            }
        }
        return streak;
    }

    function getTodaySummary() {
        const today = appState.daily.history[getTodayKey()] || { questions: 0, xp: 0, seconds: 0 };
        const catStats = categoryMetrics();
        const weakTopic = Object.entries(catStats).sort((a, b) => a[1].mastery - b[1].mastery)[0];
        return {
            ...today,
            minutes: Math.round(today.seconds / 60),
            streak: streakCount(),
            weakTopic: weakTopic ? weakTopic[0] : "-"
        };
    }

    function languageVisibility(context, question = null, strictFlashcard = false) {
        if (context === "study") {
            if (!question || !appState.language.autoReduceBengali) return { fr: true, bn: true };
            const mastery = getProgress(question.id).masteryScore;
            return { fr: true, bn: mastery < 70 };
        }

        if (context === "flashcard") {
            if (strictFlashcard) return { fr: true, bn: false };
            if (!question || !appState.language.autoReduceBengali) return { fr: true, bn: true };
            const mastery = getProgress(question.id).masteryScore;
            return { fr: true, bn: mastery < 80 };
        }

        // quiz / exam / conditioning / recall
        return { fr: true, bn: false };
    }

    function keywordHighlights(text) {
        const source = escapeHtml(text || "");
        return source.replace(/(République|Constitution|laïcité|laicite|14 juillet|Marseillaise|Marianne|Parlement|Président|égalité|liberté|fraternité|élections|vote|école|Union européenne|UE|drapeau|Bastille)/gi, "<strong>$1</strong>");
    }

    function isWeakCategory(category) {
        const metrics = categoryMetrics()[category];
        return metrics ? metrics.mastery < 55 : false;
    }

    function explanationDepth(question) {
        const p = getProgress(question.id);
        if (p.failCount >= 2 || p.unsureCount >= 2 || isWeakCategory(question.category)) return "rich";
        if (p.masteryScore >= 70) return "short";
        return "medium";
    }

            };

            droits: "Indice: pensez au principe republicain protege par la loi.",
            vote: "Indice: verifiez age, citoyennete et inscription.",
            education: "Indice: reperez le niveau scolaire ou l'obligation legale.",
            sante: "Indice: pensez au parcours de soin et aux services officiels."
        };
        const primaryTag = question.tags[0] || "general";
        return {
            fr: genericByTag[primaryTag] || "Indice: reliez la question a la categorie officielle.",
            bn: "ইঙ্গিত: প্রশ্নের বিভাগের মূল ধারণা মনে করুন, সরাসরি উত্তর নয়।"
        };

    function explainQuestion(question, options = [], userAnswer = "") {
        const depth = explanationDepth(question);
        const intel = getQuestionIntel(question);
        if (intel) {
            const p = getProgress(question.id);
            const weakMode = p.failCount >= 2 || p.unsureCount >= 2;
            const wrongReasonsIntel = options
                .filter(opt => opt !== question.correctAnswer)
                .map(opt => {
                    let reason = intel.confusionWarning || "Cette option est un piege frequent pour cette notion.";
                    if (opt === userAnswer) {
                        reason = `${reason} C'est le piege principal de cette question.`;
                    }
                    return { option: opt, reason };
                });

            return {
                frShort: weakMode
                    ? `${intel.microExplanationFr} | Indice simple: ${intel.weakLearnerHint}`
                    : `${intel.microExplanationFr} 👉 ${intel.memoryHook} ⚠️ ${intel.confusionWarning}`,
                bnShort: weakMode
                    ? `${intel.microExplanationBn} | সহজ ইঙ্গিত: ${intel.weakLearnerHint}`
                    : `${intel.microExplanationBn} 👉 ${intel.fastRecallCue} ⚠️ ${intel.confusionWarning}`,
                wrongReasons: wrongReasonsIntel,
                structure: {
                    reasonFr: intel.microExplanationFr,
                    memoFr: intel.memoryHook,
                    warnFr: intel.confusionWarning,
                    hookFr: intel.fastRecallCue,
                    reasonBn: intel.microExplanationBn,
                    memoBn: `মেমো: ${intel.fastRecallCue}`,
                    warnBn: `সতর্কতা: ${intel.confusionWarning}`,
                    trap: intel.examTrap || ""
                }
            };
        }

        const pat = microPatternFor(question);
        const type = question.answerType;
        const fallbackReasonFr = {
            date: "La bonne reponse est le repere chronologique officiel attendu.",
            person: "La bonne reponse est le personnage directement associe au fait demande.",
            symbol: "La bonne reponse est un symbole institutionnel reconnu.",
            institution: "La bonne reponse correspond a l'acteur institutionnel legalement competent.",
            place: "La bonne reponse est le lieu exact attendu au programme.",
            boolean: "La bonne reponse est conforme au droit et aux valeurs republicaines.",
            number: "La bonne reponse est la valeur officielle attendue.",
            action: "La bonne reponse decrit l'action legalement correcte.",
            other: "La bonne reponse est celle de reference dans le corpus officiel CSP."
        };

        const reasonFr = pat ? pat.reasonFr : fallbackReasonFr[type] || fallbackReasonFr.other;
        const memoFr = pat ? pat.memoFr : `Memo: ${question.category.replace(/🇫🇷|🏛️|⚖️|📜|🏠/g, "").trim()} -> ${question.correctAnswer}`;
        const warnFr = pat ? pat.warnFr : "Attention au piege: l'option proche n'est pas toujours legalement exacte.";
        const hookFr = pat ? pat.hookFr : "Hook memoire: associez la question a un mot-cle de sa categorie.";

        const reasonBn = pat ? pat.reasonBn : `${question.explanation || "এই উত্তরটি অফিসিয়াল সিভিক তথ্য অনুযায়ী সঠিক।"}`;
        const memoBn = pat ? pat.memoBn : `মেমো: ${question.correctAnswer}`;
        const warnBn = pat ? pat.warnBn : "সতর্কতা: কাছাকাছি অপশনগুলো অনেক সময় ভুল হয়।";

        const frShort = depth === "short"
            ? `${reasonFr} Memo: ${question.correctAnswer}`
            : `${reasonFr} 👉 ${memoFr} ⚠️ ${warnFr}`;
        const bnShort = depth === "short"
            ? `${reasonBn}`
            : `${reasonBn} 👉 ${memoBn} ⚠️ ${warnBn}`;

        const wrongReasons = options
            .filter(opt => opt !== question.correctAnswer)
            .map(opt => {
                let reason = "Cette proposition ne correspond pas precisement a la question posee.";
                if (type === ANSWER_TYPES.DATE && !/\d{4}|juillet|mai|novembre|décembre|decembre/.test(opt.toLowerCase())) {
                    reason = "La question demande une date; cette option n'est pas une date historique attendue.";
                } else if (type === ANSWER_TYPES.PERSON && !/^[A-ZÉÈÊÂÎÔÛÀÙÇ]/.test(opt)) {
                    reason = "La question vise une personne; cette option est d'une autre nature.";
                } else if (type === ANSWER_TYPES.SYMBOL && !/drapeau|marianne|devise|hymne|coq|marseillaise/i.test(opt)) {
                    reason = "La question porte sur un symbole officiel; cette option ne correspond pas a ce type.";
                }
                if (opt === userAnswer) {
                    reason = `${reason} C'est pourquoi votre choix etait incorrect ici.`;
                }
                return { option: opt, reason };
            });

        return {
            frShort,
            bnShort,
            wrongReasons,
            structure: {
                reasonFr,
                memoFr,
                warnFr,
                hookFr,
                reasonBn,
                memoBn,
                warnBn
            }
        };
    }

    function buildSmartOptions(question, pool, prefilled = []) {
        if (prefilled.length === 4 && prefilled.includes(question.correctAnswer)) {
            return prefilled;
        }

        const correct = question.correctAnswer;
        const sameCategorySameType = pool
            .filter(q => q.id !== question.id && q.category === question.category && q.answerType === question.answerType)
            .map(q => q.correctAnswer);

        const sameType = pool
            .filter(q => q.id !== question.id && q.answerType === question.answerType)
            .map(q => q.correctAnswer);

        const sameCategory = pool
            .filter(q => q.id !== question.id && q.category === question.category)
            .map(q => q.correctAnswer);

        let distractors = unique([...shuffle(sameCategorySameType), ...shuffle(sameType), ...shuffle(sameCategory)])
            .filter(a => a !== correct)
            .slice(0, 3);

        if (question.answerType === ANSWER_TYPES.DATE && distractors.length < 3) {
            const yearMatch = correct.match(/\b(\d{4})\b/);
            if (yearMatch) {
                const year = Number(yearMatch[1]);
                const synthetic = [year - 2, year + 3, year + 9, year - 11]
                    .filter(y => y > 1500 && y < 2100)
                    .map(y => String(y));
                distractors = unique([...distractors, ...synthetic]).slice(0, 3);
            }
        }

        if (distractors.length < 3) {
            const fallback = unique(pool.map(q => q.correctAnswer).filter(a => a !== correct));
            distractors = unique([...distractors, ...shuffle(fallback)]).slice(0, 3);
        }

        return shuffle([correct, ...distractors]);
    }

        const voices = speechSynthesis.getVoices();

    function stopSpeech() {
        speechState.manualStop = true;
        speechSynthesis.cancel();
        if (speechState.activeBtn) {
            speechState.activeBtn.textContent = "🔊";
            speechState.activeBtn = null;
        }
    }

    function applySyllablePacing(text) {
        if (!appState.audio.syllablePacing) return text;
        return text
            .replace(/tion/gi, "ti-on")
            .replace(/ique/gi, "i-que")
            .replace(/eau/gi, "e-au")
            .replace(/eux/gi, "eux")
            .replace(/\s+/g, " ");
    }

    function chunkPhrase(text) {
        if (!appState.audio.chunkPlayback) return text;
        return text
            .replace(/,\s*/g, ", ... ")
            .replace(/\s+et\s+/gi, " ... et ")
            .replace(/\s+ou\s+/gi, " ... ou ");
    }

    function speakText(text, btn, onEnd, allowRepeat = true) {
        if (!appState.soundEnabled || !text) return;
        const baseRate = appState.slowSpeech ? 0.72 : 1;
        const rate = appState.audio.syllablePacing ? Math.min(baseRate, 0.62) : baseRate;
        const processedText = chunkPhrase(applySyllablePacing(text));

        if (speechSynthesis.speaking && speechState.currentText === processedText && speechState.currentRate === rate) {
            if (speechSynthesis.paused) {
                speechSynthesis.resume();
                if (btn) btn.textContent = "⏸";
            } else {
                speechSynthesis.pause();
                if (btn) btn.textContent = "▶";
            }
            return;
        }

        stopSpeech();
        speechState.manualStop = false;
        speechState.repeatedOnce = false;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "fr-FR";
        utterance.rate = rate;
        const voice = getFrenchVoice();
        if (voice) utterance.voice = voice;

        speechState.currentText = processedText;
        speechState.currentRate = rate;
        speechState.activeBtn = btn || null;
        if (btn) btn.textContent = "⏸";

        utterance.text = processedText;

        utterance.onend = () => {
            if (btn) btn.textContent = "🔊";
            speechState.activeBtn = null;
            speechState.currentText = "";
            if (allowRepeat && appState.audio.repeatAfterMe && !speechState.manualStop && !speechState.repeatedOnce) {
                speechState.repeatedOnce = true;
                setTimeout(() => speakText(text, btn, onEnd, false), 500);
                return;
            }
            speechState.repeatedOnce = false;
            if (onEnd) onEnd();
            if (appState.audio.loop && !speechState.manualStop) {
                setTimeout(() => speakText(text, btn, onEnd), 160);
            }
        };

        speechSynthesis.speak(utterance);
    }

    function pickQuizPool(mode, category) {
        const source = [...questions].sort((a, b) => getQuestionPriority(b) - getQuestionPriority(a));
        const todaySeed = new Date().toISOString().slice(0, 10).split("-").join("");
        const seededOrder = [...source].sort((a, b) => (`${a.id}${todaySeed}` > `${b.id}${todaySeed}` ? 1 : -1));

        if (mode === "category") return shuffle((byCategory[category] || []).slice());
        if (mode === "daily") return seededOrder.slice(0, 25).sort((a, b) => getQuestionPriority(b) - getQuestionPriority(a));
        if (mode === "retryWrong") return shuffle(source.filter(q => appState.wrongIds.has(q.id)));
        if (mode === "difficult") return shuffle(source.filter(q => appState.difficultIds.has(q.id)));
        if (mode === "favorites") return shuffle(source.filter(q => appState.favoriteIds.has(q.id)));
        if (mode === "exam") return shuffle(source);
        if (mode === "quick") return source;
        if (mode === "recall") {
            const weak = source.filter(q => getProgress(q.id).masteryScore < 50 || appState.wrongIds.has(q.id));
            return [...weak, ...source];
        }
        if (mode === "conditioning") {
            return source;
        }
        return [...source.slice(0, 55), ...shuffle(source.slice(55))];
    }

    function startQuizSession(mode, category = "") {
        const pool = pickQuizPool(mode, category);
        const size = Math.min(mode === "daily" ? 25 : 40, pool.length || 40);
        const chosen = pool.slice(0, size);
        if (!chosen.length) {
            refs.main.innerHTML = `<div class="card">Aucune question disponible pour ce mode.</div>`;
            return;
        }

        const config = {
            allowChange: !["exam", "conditioning"].includes(mode),
            noReveal: ["exam", "conditioning"].includes(mode),
            strict: ["exam", "conditioning"].includes(mode),
            quickSecondsPerQuestion: mode === "quick" ? 20 : mode === "recall" ? 8 : 0,
            totalSeconds: mode === "exam" ? 600 : mode === "daily" ? 480 : mode === "quick" ? 400 : mode === "recall" ? 320 : mode === "conditioning" ? 600 : 600,
            review: !["exam", "conditioning"].includes(mode),
            showHints: !["exam", "conditioning"].includes(mode),
            askConfidence: true,
            minimalUi: mode === "conditioning"
        };

        appState.mode = "quiz";
        appState.quiz = {
            mode,
            category,
            config,
            questions: chosen,
            index: 0,
            answers: {},
            optionMap: {},
            answerMeta: {},
            secondsLeft: config.totalSeconds,
            questionSecondsLeft: config.quickSecondsPerQuestion || 0,
            reviewOpen: false,
            questionStartAt: Date.now(),
            timer: null
        };

        updateTopButtons(
            mode === "category" ? refs.navCategoryQuiz :
            mode === "daily" ? refs.navDailyQuiz :
            mode === "retryWrong" ? refs.navRetryWrong :
            refs.navRandomQuiz
        );

        renderQuizShell();
        startQuizTimer();
    }

    function startQuizTimer() {
        clearInterval(appState.quiz?.timer || null);
        if (!appState.quiz) return;
        appState.quiz.timer = setInterval(() => {
            if (!appState.quiz) return;
            appState.quiz.secondsLeft -= 1;
            if (appState.quiz.config.quickSecondsPerQuestion) {
                appState.quiz.questionSecondsLeft -= 1;
                if (appState.quiz.questionSecondsLeft <= 0) {
                    if (appState.quiz.index < appState.quiz.questions.length - 1) {
                        appState.quiz.index += 1;
                        appState.quiz.questionSecondsLeft = appState.quiz.config.quickSecondsPerQuestion;
                        appState.quiz.questionStartAt = Date.now();
                        updateQuizQuestion();
                    }
                }
            }
            updateQuizTopBar();
            if (appState.quiz.secondsLeft <= 0) {
                clearInterval(appState.quiz.timer);
                submitQuiz();
            }
        }, 1000);
    }

        refs.main.querySelector("#quizPrev").addEventListener("click", () => {
            if (!appState.quiz) return;
            if (appState.quiz.index > 0) {
                appState.quiz.index -= 1;
                updateQuizQuestion();
            }
        });

        refs.main.querySelector("#quizNext").addEventListener("click", () => {
            if (!appState.quiz) return;
            if (appState.quiz.index < appState.quiz.questions.length - 1) {
                appState.quiz.index += 1;
                updateQuizQuestion();
            }
        });

        refs.main.querySelector("#quizSubmit").addEventListener("click", submitQuiz);
        refs.main.querySelector("#quizReview").addEventListener("click", toggleReviewPanel);
        refs.main.querySelector("#showHintBtn")?.addEventListener("click", () => {
            if (!appState.quiz) return;
            const q = appState.quiz.questions[appState.quiz.index];
            const lang = languageVisibility("quiz", q);
            const hint = generateHint(q);
            refs.main.querySelector("#quizHintText").textContent = hint.fr;
            refs.main.querySelector("#quizHintBn").textContent = lang.bn ? hint.bn : "";
        });
        refs.main.querySelector("#speakQuizQuestion").addEventListener("click", (e) => {
            if (!appState.quiz) return;
            const q = appState.quiz.questions[appState.quiz.index];
            speakText(q.questionFr, e.currentTarget);
        });

        refs.main.querySelector("#quizOptions").addEventListener("click", (e) => {
            const optionBtn = e.target.closest(".option");
            if (!optionBtn || !appState.quiz) return;
            const q = appState.quiz.questions[appState.quiz.index];
            if (!appState.quiz.config.allowChange && appState.quiz.answers[q.id]) return;
            const value = optionBtn.dataset.value;
            const responseSec = Math.max(1, Math.round((Date.now() - appState.quiz.questionStartAt) / 1000));
            appState.quiz.answers[q.id] = value;
            appState.quiz.answerMeta[q.id] = { responseSec, confidence: "unsure" };
            markOptionsSelection(q.id);
            const confidencePanel = refs.main.querySelector("#confidencePanel");
            if (appState.quiz.config.askConfidence && confidencePanel) {
                confidencePanel.style.display = "flex";
            }
            saveState();
            if (value !== q.correctAnswer) maybeVibrateWrong();
        });

        refs.main.querySelector("#confidentBtn")?.addEventListener("click", () => {
            if (!appState.quiz) return;
            const q = appState.quiz.questions[appState.quiz.index];
            if (!appState.quiz.answerMeta[q.id]) appState.quiz.answerMeta[q.id] = { responseSec: 10, confidence: "confident" };
            appState.quiz.answerMeta[q.id].confidence = "confident";
            saveState();
            refs.main.querySelector("#confidencePanel").style.display = "none";
        });

        refs.main.querySelector("#unsureBtn")?.addEventListener("click", () => {
            if (!appState.quiz) return;
            const q = appState.quiz.questions[appState.quiz.index];
            if (!appState.quiz.answerMeta[q.id]) appState.quiz.answerMeta[q.id] = { responseSec: 10, confidence: "unsure" };
            appState.quiz.answerMeta[q.id].confidence = "unsure";
            saveState();
            refs.main.querySelector("#confidencePanel").style.display = "none";
        });

        refs.main.querySelector("#quizOptions").addEventListener("keydown", (e) => {
            if (["Enter", " "].includes(e.key) && e.target.classList.contains("option")) {
                e.preventDefault();
                e.target.click();
                return;
            }
            if (!["ArrowDown", "ArrowUp"].includes(e.key)) return;
            e.preventDefault();
            const options = Array.from(refs.main.querySelectorAll("#quizOptions .option"));
            if (!options.length) return;
            const activeIndex = options.indexOf(document.activeElement);
            const step = e.key === "ArrowDown" ? 1 : -1;
            const next = (activeIndex + step + options.length) % options.length;
            options[next].focus();
        });

        updateQuizQuestion();
    }

    function toggleReviewPanel() {
        if (!appState.quiz) return;

    function formatTimer(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, "0");
        const s = Math.max(0, seconds % 60).toString().padStart(2, "0");
        return `${m}:${s}`;
    }

    function updateQuizTopBar() {
        if (!appState.quiz) return;
        const total = appState.quiz.questions.length;
        const current = appState.quiz.index + 1;
        const answeredCount = appState.quiz.questions.filter(q => appState.quiz.answers[q.id]).length;
        const quickPart = appState.quiz.config.quickSecondsPerQuestion ? ` | ${appState.quiz.config.quickSecondsPerQuestion}s: ${String(Math.max(0, appState.quiz.questionSecondsLeft)).padStart(2, "0")}` : "";
        const modeLabel = appState.quiz.mode === "conditioning" ? "Conditionnement" : appState.quiz.mode === "exam" ? "Examen reel" : appState.quiz.mode === "recall" ? "Fast Recall" : "Pratique";
        refs.main.querySelector("#quizMetaIndex").textContent = `${modeLabel} | Question ${current}/${total} - Repondues ${answeredCount}/${total}`;
        refs.main.querySelector("#quizMetaTimer").textContent = `Temps ${formatTimer(appState.quiz.secondsLeft)}${quickPart}`;
        refs.main.querySelector("#quizProgressFill").style.width = `${(current / total) * 100}%`;
    }

    function markOptionsSelection(questionId) {
        const selected = appState.quiz?.answers?.[questionId];
        const optionNodes = refs.main.querySelectorAll("#quizOptions .option");
        optionNodes.forEach(node => {
            const isSelected = node.dataset.value === selected;
            node.classList.toggle("selected", isSelected);
            node.setAttribute("aria-checked", isSelected ? "true" : "false");
        });
    }

    function updateQuizQuestion() {
        if (!appState.quiz) return;
        const q = appState.quiz.questions[appState.quiz.index];
        const lang = languageVisibility("quiz", q);
        const options = buildSmartOptions(q, questions, appState.quiz.optionMap[q.id]);
        const intel = getQuestionIntel(q);
        appState.quiz.optionMap[q.id] = options;
        appState.quiz.questionStartAt = Date.now();
        if (appState.quiz.config.quickSecondsPerQuestion) appState.quiz.questionSecondsLeft = appState.quiz.config.quickSecondsPerQuestion;

        refs.main.querySelector("#quizQuestionText").innerHTML = keywordHighlights(q.questionFr);
        refs.main.querySelector("#quizQuestionBn").textContent = lang.bn ? (q.questionBn || "") : "";
        const hint = generateHint(q);
        refs.main.querySelector("#quizHintText").textContent = appState.quiz.config.showHints ? "Indice contextuel pour activer le rappel." : "";
        refs.main.querySelector("#quizHintBn").textContent = lang.bn && appState.quiz.config.showHints ? hint.bn : "";

        const confidencePanel = refs.main.querySelector("#confidencePanel");
        if (confidencePanel) confidencePanel.style.display = "none";

        const p = getProgress(q.id);
        if (appState.quiz.config.showHints && (p.failCount >= 2 || p.unsureCount >= 2 || isWeakCategory(q.category))) {
            refs.main.querySelector("#quizHintText").textContent = hint.fr;
        }

        if (appState.quiz.mode === "recall" || appState.quiz.mode === "retryWrong") {
            const cue = intel ? intel.fastRecallCue : (hint.fr || "Indice de rappel");
            refs.main.querySelector("#quizHintText").textContent = `Cue: ${cue}`;
            refs.main.querySelector("#quizHintBn").textContent = "";
        }

        if (intel && intel.pronunciationFocus && !appState.quiz.config.minimalUi) {
            refs.main.querySelector("#quizHintText").textContent = `${refs.main.querySelector("#quizHintText").textContent} | Prononciation: ${intel.pronunciationFocus}`.trim();
        }

        const optionsRoot = refs.main.querySelector("#quizOptions");

            <div class="option" role="radio" tabindex="0" aria-checked="false" data-value="${escapeHtml(opt)}">
                <span>${escapeHtml(opt)}</span>

            </div>

        optionsRoot.querySelectorAll(".speak-option").forEach(btn => {
            btn.addEventListener("click", (e) => {

                speakText(btn.dataset.opt, btn);

        if (appState.audio.autoPlay) {

                speakText(q.questionFr, null, () => speakText(q.correctAnswer, null));
            } else {
                speakText(q.questionFr);
            }
        }

        markOptionsSelection(q.id);
        updateQuizTopBar();
        if (appState.quiz.reviewOpen) toggleReviewPanel();

    function submitQuiz() {
        if (!appState.quiz) return;
        clearInterval(appState.quiz.timer);
        stopSpeech();

        const result = appState.quiz.questions.map(q => {
            const userAnswer = appState.quiz.answers[q.id] || "(pas de reponse)";
            const ok = userAnswer === q.correctAnswer;
            const options = appState.quiz.optionMap[q.id] || [];
            const exp = explainQuestion(q, options, userAnswer);
            const responseSec = appState.quiz.answerMeta[q.id]?.responseSec || 12;
            const confidence = appState.quiz.answerMeta[q.id]?.confidence || "unsure";
            updateProgress(q, ok, responseSec, confidence);
            recordDailyActivity(1, ok ? 4 : 2, responseSec);
            return {
                id: q.id,
                category: q.category,
                question: q.questionFr,
                correct: q.correctAnswer,
                user: userAnswer,
                ok,
                responseSec,
                confidence,
                explainFr: exp.frShort,
                explainBn: exp.bnShort,
                explainStruct: exp.structure,
                wrongReasons: exp.wrongReasons
            };
        });

        const score = result.filter(r => r.ok).length;
        const total = result.length;
        const percent = Math.round((score / total) * 100);

        appState.wrongIds.clear();
        result.filter(r => !r.ok).forEach(r => appState.wrongIds.add(r.id));

        const categoryAgg = {};
        result.forEach(r => {
            if (!categoryAgg[r.category]) categoryAgg[r.category] = { total: 0, errors: 0 };
            categoryAgg[r.category].total += 1;
            if (!r.ok) categoryAgg[r.category].errors += 1;
        });

        const weakCategories = Object.entries(categoryAgg)
            .map(([category, stats]) => ({ category, errorRate: stats.errors / stats.total, errors: stats.errors }))
            .filter(v => v.errors > 0)
            .sort((a, b) => b.errorRate - a.errorRate)
            .slice(0, 3);

        appState.stats.quizzesTaken += 1;
        appState.stats.lastScore = percent;
        appState.stats.bestScore = Math.max(appState.stats.bestScore, percent);
        appState.stats.avgResponseSec = Math.round(result.reduce((s, r) => s + r.responseSec, 0) / result.length);
        saveState();

        if (percent >= 80) launchConfetti();

        refs.main.innerHTML = `
            <section class="analytics">
                <h2>Resultat final</h2>
                <div class="stats">
                    <div class="stat"><strong>${score}/${total}</strong><span>Score</span></div>
                    <div class="stat"><strong>${percent}%</strong><span>Pourcentage</span></div>
                    <div class="stat"><strong>${weakCategories.length}</strong><span>Categories faibles</span></div>
                    <div class="stat"><strong>${appState.stats.avgResponseSec}s</strong><span>Vitesse reponse</span></div>
                </div>
                <div class="card">
                    <p>${percent >= 85 ? "Excellent progress! Votre niveau est proche des conditions d'examen." : percent >= 65 ? "Vous progressez clairement. Continuez la repetition espacee sur les faiblesses." : "Base solide en cours. Priorisez les erreurs recentes et les categories faibles."}</p>
                    <p>Reponses "unsure": ${result.filter(r => r.confidence === "unsure").length}. Elles seront revues plus tot.</p>
                </div>
                <div class="card">
                    <h3>Categories a renforcer</h3>
                    ${weakCategories.length ? weakCategories.map(w => `<p><strong>${escapeHtml(w.category)}</strong> - ${Math.round(w.errorRate * 100)}% d'erreurs</p>`).join("") : "<p>Aucune faiblesse evidente.</p>"}
                </div>
                <div class="card">
                    <h3>Revision des erreurs</h3>
                    ${result.filter(r => !r.ok).map(r => `
                        <div style="padding:8px 0; border-bottom:1px solid var(--border);">
                            <p><strong>Q:</strong> ${escapeHtml(r.question)}</p>
                            <p><strong>Bonne reponse:</strong> ${escapeHtml(r.correct)}</p>
                            <p><strong>Votre reponse:</strong> ${escapeHtml(r.user)}</p>
                            <p><strong>Pourquoi:</strong> ${escapeHtml(r.explainStruct.reasonFr)}</p>
                            <p><strong>Memo:</strong> ${escapeHtml(r.explainStruct.memoFr)}</p>
                            <p><strong>Attention:</strong> ${escapeHtml(r.explainStruct.warnFr)}</p>
                            ${r.wrongReasons.slice(0, 3).map(w => `<p>- ${escapeHtml(w.option)}: ${escapeHtml(w.reason)}</p>`).join("")}
                        </div>
                    `).join("") || "<p>Aucune erreur.</p>"}
                </div>
                <div class="quiz-actions">
                    <button id="redoWrongNow" class="btn btn-primary" type="button">Reessayer erreurs</button>
                    <button id="showAnalytics" class="btn" type="button">Voir analytics</button>
                    <button id="goStudy" class="btn" type="button">Retour etude</button>
                </div>
            </section>
        `;

        refs.main.querySelector("#redoWrongNow").addEventListener("click", () => startQuizSession("retryWrong"));
        refs.main.querySelector("#showAnalytics").addEventListener("click", renderAnalyticsDashboard);
        refs.main.querySelector("#goStudy").addEventListener("click", renderStudyView);
        appState.quiz = null;
    }

        appState.mode = "flashcard";

                <div class="quiz-actions" style="margin-top:12px;">

    function nextFlash() {
        if (!appState.flashcard) return;
        appState.flashcard.index += 1;
        appState.flashcard.reveal = false;
        if (appState.flashcard.index >= appState.flashcard.queue.length) {
            saveState();
            renderStudyView();
            return;
        }
        saveState();
        renderFlashcard();
    }

    function startListenMode() {
        const queue = [...questions]
            .sort((a, b) => {
                const ai = getQuestionIntel(a);
                const bi = getQuestionIntel(b);
                const pa = getProgress(a.id);
                const pb = getProgress(b.id);
                const aBoost = (ai?.pronunciationFocus ? 12 : 0) + pa.failCount * 3;
                const bBoost = (bi?.pronunciationFocus ? 12 : 0) + pb.failCount * 3;
                return (getQuestionPriority(b) + bBoost) - (getQuestionPriority(a) + aBoost);
            })
            .slice(0, 25);
        refs.main.innerHTML = `
            <section class="card">
                <h2>Listen and repeat</h2>
                <p>Mode audio sequentiel question + reponse. Ideal pour memoire auditive.</p>
                <div class="quiz-actions">
                    <button id="listenStart" class="btn btn-primary" type="button">Demarrer</button>
                    <button id="listenStop" class="btn" type="button">Arreter</button>
                    <button id="listenBack" class="btn" type="button">Retour</button>
                </div>
                <div id="listenNow" style="margin-top:10px;"></div>
            </section>
        `;

        let idx = 0;
        let running = false;
        const next = () => {
            if (!running || idx >= queue.length) return;
            const q = queue[idx];
            refs.main.querySelector("#listenNow").innerHTML = `<p><strong>${idx + 1}/${queue.length}</strong> ${escapeHtml(q.questionFr)}</p><p>${escapeHtml(q.correctAnswer)}</p>`;
            speakText(q.questionFr, null, () => {
                speakText(q.correctAnswer, null, () => {
                    updateProgress(q, true, 9);
                    recordDailyActivity(1, 2, 9);
                    idx += 1;
                    setTimeout(next, 500);
                });
            });
        };

        refs.main.querySelector("#listenStart").addEventListener("click", () => {
            running = true;
            next();
        });
        refs.main.querySelector("#listenStop").addEventListener("click", () => {
            running = false;
            stopSpeech();
        });
        refs.main.querySelector("#listenBack").addEventListener("click", () => {
            running = false;
            stopSpeech();
            saveState();
            renderStudyView();
        });
    }

    function renderAnalyticsDashboard() {
        const cat = categoryMetrics();
        const entries = Object.entries(cat);
        const strongest = entries.sort((a, b) => b[1].mastery - a[1].mastery).slice(0, 3);
        const weakest = [...entries].sort((a, b) => a[1].mastery - b[1].mastery).slice(0, 3);
        const reviewed = questions.filter(q => !!getProgress(q.id).lastReviewed);
        const totalSuccess = reviewed.reduce((s, q) => s + getProgress(q.id).successCount, 0);
        const totalFail = reviewed.reduce((s, q) => s + getProgress(q.id).failCount, 0);
        const totalUnsure = reviewed.reduce((s, q) => s + getProgress(q.id).unsureCount, 0);
        const accuracy = totalSuccess + totalFail ? Math.round((totalSuccess / (totalSuccess + totalFail)) * 100) : 0;
        const avgSpeed = reviewed.length ? Math.round(reviewed.reduce((s, q) => s + getProgress(q.id).avgSec, 0) / reviewed.length) : 0;
        const mastery = Math.round(questions.reduce((s, q) => s + getProgress(q.id).masteryScore, 0) / questions.length);
        const readiness = Math.min(100, Math.round(accuracy * 0.45 + mastery * 0.4 + Math.max(0, 100 - questions.filter(q => getProgress(q.id).masteryScore < 45).length) * 0.15));
        const likelyFail = weakest.map(([name, val]) => ({ name, risk: Math.min(95, 100 - val.mastery + val.weak * 2) }));
        const passProbability = Math.max(5, Math.min(99, Math.round(readiness * 0.88 + (100 - totalUnsure) * 0.12)));

        const intelQuestions = questions.filter(q => !!getQuestionIntel(q));
        const confusionTopics = intelQuestions
            .map(q => ({
                id: q.id,
                q: q.questionFr,
                trap: getQuestionIntel(q)?.examTrap || "",
                confusion: getProgress(q.id).confusionTrapCount
            }))
            .sort((a, b) => b.confusion - a.confusion)
            .slice(0, 5);
        const slowRecallConcepts = questions
            .map(q => ({ q: q.questionFr, slow: getProgress(q.id).slowRecallCount, avg: getProgress(q.id).avgSec }))
            .sort((a, b) => (b.slow * 10 + b.avg) - (a.slow * 10 + a.avg))
            .slice(0, 5);
        const highConfidenceFails = questions
            .map(q => ({ q: q.questionFr, c: getProgress(q.id).highConfidenceFailCount }))
            .filter(x => x.c > 0)
            .sort((a, b) => b.c - a.c)
            .slice(0, 5);
        const strongestAnchors = intelQuestions
            .map(q => ({
                q: q.questionFr,
                anchor: getQuestionIntel(q)?.memoryHook || "",
                mastery: getProgress(q.id).masteryScore
            }))
            .sort((a, b) => b.mastery - a.mastery)
            .slice(0, 5);

        const todayKey = getTodayKey();
        const yesterdayKey = addDays(todayKey, -1);
        const todayXp = appState.daily.history[todayKey]?.xp || 0;
        const yesterdayXp = appState.daily.history[yesterdayKey]?.xp || 0;
        const last7Days = Array.from({ length: 7 }).map((_, i) => addDays(todayKey, -i)).reverse();
        const firstHalf = last7Days.slice(0, 3).map(d => appState.daily.history[d]?.seconds || 0);
        const secondHalf = last7Days.slice(3).map(d => appState.daily.history[d]?.seconds || 0);
        const firstAvg = firstHalf.length ? Math.round(firstHalf.reduce((a, b) => a + b, 0) / firstHalf.length) : 0;
        const secondAvg = secondHalf.length ? Math.round(secondHalf.reduce((a, b) => a + b, 0) / secondHalf.length) : 0;
        const speedImprovement = firstAvg && secondAvg ? Math.round(((secondAvg - firstAvg) / Math.max(1, firstAvg)) * 100) : 0;

        refs.main.innerHTML = `
            <section class="analytics">
                <h2>Tableau analytique</h2>
                <div class="stats">
                    <div class="stat"><strong>${accuracy}%</strong><span>Accuracy</span></div>
                    <div class="stat"><strong>${avgSpeed}s</strong><span>Vitesse reponse</span></div>
                    <div class="stat"><strong>${mastery}%</strong><span>Maitrise</span></div>
                    <div class="stat"><strong>${readiness}%</strong><span>Preparation examen predite</span></div>
                    <div class="stat"><strong>${passProbability}%</strong><span>Probabilite de reussite estimee</span></div>
                    <div class="stat"><strong>${totalUnsure}</strong><span>Reponses "unsure"</span></div>
                </div>
                <div class="card">
                    <h3>Categories les plus fortes</h3>
                    ${strongest.map(([name, val]) => `<p>${escapeHtml(name)} - ${val.mastery}%</p>`).join("")}
                </div>
                <div class="card">
                    <h3>Categories les plus faibles</h3>
                    ${weakest.map(([name, val]) => `<p>${escapeHtml(name)} - ${val.mastery}% | ${val.weak} questions faibles</p>`).join("")}
                </div>
                <div class="card">
                    <h3>Categories les plus a risque a l'examen</h3>
                    ${likelyFail.map(item => `<p>${escapeHtml(item.name)} - risque estime ${item.risk}%</p>`).join("")}
                </div>
                <div class="card">
                    <h3>Progression recente</h3>
                    <p>XP aujourd'hui: ${todayXp}</p>
                    <p>XP hier: ${yesterdayXp}</p>
                    <p>${todayXp > yesterdayXp ? "Vous avez progresse par rapport a hier." : "Continuez: la progression peut accelerer avec la repetition espacee."}</p>
                    <p>Questions faibles restantes: ${questions.filter(q => getProgress(q.id).masteryScore < 45).length}</p>
                    <p>Amelioration vitesse de rappel (7 jours): ${speedImprovement >= 0 ? `+${speedImprovement}%` : `${speedImprovement}%`}</p>
                </div>
                <div class="card">
                    <h3>Confusion-prone topics</h3>
                    ${confusionTopics.length ? confusionTopics.map(t => `<p>${escapeHtml(t.q)} - ${escapeHtml(t.trap)} (${t.confusion})</p>`).join("") : "<p>Aucun signal fort pour le moment.</p>"}
                </div>
                <div class="card">
                    <h3>Slow recall concepts</h3>
                    ${slowRecallConcepts.map(t => `<p>${escapeHtml(t.q)} - lenteur: ${t.slow}, moyenne: ${t.avg}s</p>`).join("")}
                </div>
                <div class="card">
                    <h3>High-confidence failures</h3>
                    ${highConfidenceFails.length ? highConfidenceFails.map(t => `<p>${escapeHtml(t.q)} - ${t.c}</p>`).join("") : "<p>Aucune erreur en confiance elevee actuellement.</p>"}
                </div>
                <div class="card">
                    <h3>Strongest memory anchors</h3>
                    ${strongestAnchors.length ? strongestAnchors.map(t => `<p>${escapeHtml(t.anchor)} - maitrise ${t.mastery}%</p>`).join("") : "<p>En cours de construction.</p>"}
                </div>
                <div class="quiz-actions">
                    <button id="analyticsBack" class="btn" type="button">Retour etude</button>
                </div>
            </section>
        `;

        refs.main.querySelector("#analyticsBack").addEventListener("click", renderStudyView);
    }

    function showCategoryPickerAndStart() {
        const categories = Object.keys(byCategory);
        refs.main.innerHTML = `
            <section class="view-head">
                <h2>Quiz par categorie</h2>
                <select id="quizCategorySelect">
                    ${categories.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join("")}
                </select>
                <button id="startCategoryQuiz" class="btn btn-primary" type="button">Demarrer</button>
            </section>
        `;
        refs.main.querySelector("#startCategoryQuiz").addEventListener("click", () => {
            const cat = refs.main.querySelector("#quizCategorySelect").value;
            startQuizSession("category", cat);
        });
    }

    function wireGlobalActions() {
        refs.navStudy.addEventListener("click", renderStudyView);
        refs.navRandomQuiz.addEventListener("click", () => startQuizSession("random"));
        refs.navCategoryQuiz.addEventListener("click", showCategoryPickerAndStart);
        refs.navDailyQuiz.addEventListener("click", () => startQuizSession("daily"));
        refs.navRetryWrong.addEventListener("click", () => startQuizSession("retryWrong"));

        refs.soundToggle.addEventListener("click", () => {
            appState.soundEnabled = !appState.soundEnabled;
            if (!appState.soundEnabled) stopSpeech();
            saveState();
            updateTopButtons(null);
        });

        refs.speedToggle.addEventListener("click", () => {
            appState.slowSpeech = !appState.slowSpeech;
            saveState();
            updateTopButtons(null);
        });

        refs.themeToggle.addEventListener("click", () => {
            appState.theme = appState.theme === "auto" ? "light" : appState.theme === "light" ? "dark" : "auto";
            applyTheme();
            saveState();
        });
    }

    let deferredInstallPrompt = null;

    async function registerServiceWorker() {
        if (!("serviceWorker" in navigator)) return;
        try {
            const registration = await navigator.serviceWorker.register("sw.js", { scope: "./" });
            if (registration && "navigationPreload" in registration) {
                try {
                    await registration.navigationPreload.enable();
                } catch (_e) {
                    // keep boot resilient across browser versions
                }
            }
        } catch (_e) {
            // app remains functional without SW
        }
    }

    function wireInstallPrompt() {
        const installBtn = document.getElementById("installAppBtn");
        if (!installBtn) return;

        window.addEventListener("beforeinstallprompt", (event) => {
            event.preventDefault();
            deferredInstallPrompt = event;
            installBtn.classList.add("show");
        });

        installBtn.addEventListener("click", async () => {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            try {
                await deferredInstallPrompt.userChoice;
            } finally {
                deferredInstallPrompt = null;
                installBtn.classList.remove("show");
            }
        });

        window.addEventListener("appinstalled", () => {
            deferredInstallPrompt = null;
            installBtn.classList.remove("show");
        });
    }

    loadState();
    questions.forEach(q => getProgress(q.id));
    applyTheme();
    wireGlobalActions();
    wireInstallPrompt();
    registerServiceWorker();
    renderStudyView();
</script>
</body>
</html>
